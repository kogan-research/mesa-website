{{ define "main" }}
<section class="content">
    <div class="container">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
        
        {{ range .Pages }}
        <article class="list-item">
            <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
            {{ .Summary }}
        </article>
        {{ end }}
    </div>
</section>
{{ end }}
