{{ define "main" }}
<section class="hero hero--research">
    <div class="hero-media"{{ with .Params.heroImage }} style="background-image: url('{{ . | strings.TrimPrefix "/" | relURL }}');"{{ end }}></div>
    <div class="container hero-inner hero-inner--left">
        <p class="hero-kicker">{{ .Params.heroKicker | default "Our Research" }}</p>
        <h1 class="hero-title">{{ .Params.heroTitle | default .Title }}</h1>
        {{ with .Params.heroTagline }}
        <p class="hero-tagline">{{ . }}</p>
        {{ end }}
    </div>
</section>

<section class="section section--pillars">
    <div class="container">
        <h2 class="section-title">{{ .Params.pillarsTitle | default "Pillars in Our Research" }}</h2>
        {{ .Content }}
    </div>
</section>
{{ end }}
