{{ define "main" }}
<section class="hero hero--publications">
    <div class="hero-media"{{ with .Params.heroImage }} style="background-image: url('{{ . | relURL }}');"{{ end }}></div>
    <div class="container hero-inner hero-inner--left">
        <div class="hero-content">
            {{ with .Params.heroKicker }}
            <p class="hero-kicker">{{ . }}</p>
            {{ end }}
            <h1 class="hero-title">{{ .Params.heroTitle | default .Title }}</h1>
            {{ with .Params.heroCta }}
            <a class="btn btn--primary" href="{{ .link }}">{{ .label }}</a>
            {{ end }}
        </div>
    </div>
</section>

<section class="section section--publications">
    <div class="container">
        {{ .Content }}
    </div>
</section>
{{ end }}
