{{ define "main" }}
<section class="hero hero--home">
    <div class="hero-media"{{ with .Params.heroImage }} style="background-image: url('{{ . | strings.TrimPrefix "/" | absURL }}');"{{ end }}></div>
    <div class="container hero-inner">
        <div class="hero-content">
            <h1 class="hero-title">{{ .Params.heroTitle | default (.Site.Params.labName | default .Site.Title) }}</h1>
            {{ with .Params.heroTagline }}
            <p class="hero-tagline">{{ . }}</p>
            {{ end }}
            <p class="hero-lead">{{ .Params.heroLead | default .Site.Params.labDescription }}</p>
        </div>
    </div>
</section>

{{ if .Content }}
<section class="home-content">
    <div class="container">
        {{ .Content }}
    </div>
</section>
{{ end }}
{{ end }}
