{{ define "main" }}
<section class="hero">
    <div class="container">
        <div class="hero-header">
            {{ if .Site.Params.logo }}
            <div class="hero-logo">
                <img src="{{ .Site.Params.logo | relURL }}" alt="{{ .Site.Params.labName | default .Site.Title }}">
            </div>
            {{ end }}
            <h1>{{ .Site.Params.labName | default .Site.Title }}</h1>
        </div>
        <p class="lead">{{ .Site.Params.labDescription }}</p>
    </div>
</section>

<section class="content">
    <div class="container">
        {{ .Content }}
    </div>
</section>
{{ end }}
